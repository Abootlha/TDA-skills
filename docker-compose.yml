version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tdaskills-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENV=production
      - GIN_MODE=release
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=tdaskills
      - POSTGRES_USER=tdaskills
      - POSTGRES_PASSWORD=tdaskills_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=tdaskills_redis_pass
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: tdaskills-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tdaskills
      POSTGRES_USER: tdaskills
      POSTGRES_PASSWORD: tdaskills_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tdaskills -d tdaskills"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tdaskills-redis
    restart: unless-stopped
    command: redis-server --requirepass tdaskills_redis_pass
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "tdaskills_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
